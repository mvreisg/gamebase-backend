version: 0.2

env:
  variables:
    SODIUM_CRYPTO_SECRETBOX_KEY: b49cb41a2cff8db4f99ea27c7d80a4073337108c228535da506970fd1fbc34e8
    JWT_SECRET: batata

phases:
  install:
    commands:   
      - apt-get update
      - apt-get install -y libsodium-dev
      - docker-php-ext-install sodium
      - php -r "if (extension_loaded('sodium')) { echo 'Sodium is loaded'; } else { echo 'Sodium is NOT loaded'; }"     
      - composer install
  build:
    commands:   
      - composer format
      - composer lint
      - composer lint:fix  
      - composer test  
