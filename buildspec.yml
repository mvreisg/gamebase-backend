version: 0.2

env:
  variables:
    SODIUM_CRYPTO_SECRETBOX_KEY: b49cb41a2cff8db4f99ea27c7d80a4073337108c228535da506970fd1fbc34e8
    JWT_SECRET: batata

image: "php:8.2-apache"

phases:
  install:
    commands:
      - apt-get update
      - apt-get install -y libsodium-dev zip git unzip libxml2-dev libicu-dev
      - echo "extension=sodium.so" > /usr/local/etc/php/conf.d/40-sodium.ini
      - composer install --dev 
  build:
    commands:
      - php -m | grep sodium
      - php -r "if (function_exists('sodium_crypto_secretbox')) { echo 'Sodium está funcionando!'; } else { echo 'Sodium NÃO está disponível!'; }"
      - composer format
      - composer lint
      - composer lint:fix  
      - composer test  
