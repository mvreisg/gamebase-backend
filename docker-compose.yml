services:
  nginx:
    image: nginx:1.29.1
    container_name: gamebase-backend-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    ports:
      - "${NGINX_EXPOSE_PORT}:${NGINX_PORT}"
    networks:
      - gamebase-backend-network
    depends_on:
      php:
        condition: service_healthy

  php:
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      MACHINE: ${MACHINE}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamebase-backend-php
    networks:
      - gamebase-backend-network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:8.2.1
    container_name: gamebase-backend-redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXPOSE_PORT}:${REDIS_PORT}"
    networks:
      - gamebase-backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mariadb:
    image: mariadb:12.0.2
    container_name: gamebase-backend-mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "${REPOSITORY_EXPOSE_PORT}:${REPOSITORY_PORT}"
    networks:
      - gamebase-backend-network
    environment:
      MARIADB_ROOT_PASSWORD: "${REPOSITORY_ROOT_PASSWORD}"
      MARIADB_DATABASE: "${REPOSITORY_DATABASE}"
      MARIADB_USER: "${REPOSITORY_USERNAME}"
      MARIADB_PASSWORD: "${REPOSITORY_PASSWORD}"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mariadb_data:
  redis_data:

networks:
  gamebase-backend-network:
    driver: bridge
