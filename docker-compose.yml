services:
  php:
    build: .
    container_name: gamebase-backend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "rootpass"
      MYSQL_DATABASE: "gamebase"
      MYSQL_USER: "root"
      MYSQL_PASSWORD: "rootpass"
    ports:
      - "3312:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
